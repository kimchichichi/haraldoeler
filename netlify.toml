[build]
     publish = "."

[[headers]]
  for = "/image/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/projekte/image/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/projekte/image/page/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Bundles are cache-busted via a ?v= query string in the HTML, so they can
# be cached long-term. Remember to bump ?v= whenever a bundle is rebuilt.
[[headers]]
  for = "/assets/*.bundle.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/news/image/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/news/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Clean URLs: projekte (extensionless) ──────────────
[[redirects]]
  from = "/projekte"
  to = "/projekte.html"
  status = 200

[[redirects]]
  from = "/projekte.html"
  to = "/projekte"
  status = 301
  force = true

