[build]
     publish = "."

[[headers]]
  for = "/image/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/projekte/image/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[redirects]]
     from = "/*"
     to = "/index.html"
     status = 200