  <style>
:root{--ink:#0e0d0c;--paper:#f4f1ec;--paper-2:#ebe6dd;--muted:#6b655c;--accent:#6b1d1a;--accent-soft:#8a2a26;--serif:'Cormorant Garamond',serif;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:400;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.site-header{position:sticky;top:0;z-index:100;background:var(--paper);border-bottom:1px solid color-mix(in srgb,var(--ink) 12%,transparent);backdrop-filter:saturate(140%)}
.header-inner{max-width:1480px;margin:0 auto;padding:22px 48px;display:grid;grid-template-columns:1fr auto;align-items:baseline;gap:48px}
.wordmark{font-family:var(--sans);font-weight:500;font-size:13px;letter-spacing:0.32em;text-transform:uppercase}
.wordmark .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);margin:0 10px 2px;vertical-align:middle}
.wordmark small{font-family:var(--serif);font-style:italic;font-weight:400;font-size:13px;letter-spacing:0.04em;text-transform:none;color:var(--muted)}
nav.primary{display:flex;gap:28px;font-size:12px;letter-spacing:0.18em;text-transform:lowercase}
nav.primary a{color:var(--muted);position:relative;padding:4px 0;transition:color .25s ease}
nav.primary a.active{color:var(--ink)}
nav.primary a:hover{color:var(--ink)}
nav.primary a.active::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:1px;background:var(--accent)}
.article-nav{max-width:1480px;margin:0 auto;padding:32px 48px 0}
.back-link{font-family:var(--mono);font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);display:inline-flex;align-items:center;gap:10px;transition:color .2s}
.back-link:hover{color:var(--accent)}
.back-link::before{content:"←";font-size:14px}
.article-head{max-width:1480px;margin:0 auto;padding:40px 48px 48px;border-bottom:1px solid color-mix(in srgb,var(--ink) 14%,transparent)}
.article-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
.article-title{font-family:var(--serif);font-weight:400;font-size:clamp(40px,7vw,96px);line-height:0.95;letter-spacing:-0.02em}
.article-title em{font-style:italic;color:var(--accent)}
.article-subtitle{margin-top:18px;font-family:var(--serif);font-style:italic;font-weight:300;font-size:20px;color:var(--muted)}
.article-body{max-width:1480px;margin:0 auto;padding:64px 48px 120px}
.media-gallery{display:grid;gap:12px}
.media-gallery img{width:100%;display:block;filter:grayscale(0.5) contrast(1.05);transition:filter .5s ease}
.media-gallery img:hover{filter:grayscale(0) contrast(1)}
.site-footer{border-top:1px solid color-mix(in srgb,var(--ink) 14%,transparent);padding:32px 48px;font-family:var(--mono);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);display:grid;grid-template-columns:1fr auto 1fr;gap:24px;max-width:1480px;margin:0 auto}
.site-footer .center{text-align:center}
.site-footer .right{text-align:right}
@media(max-width:720px){.header-inner{padding:18px 24px;gap:16px}nav.primary{display:none}.article-nav,.article-head{padding-left:24px;padding-right:24px}.article-body{padding:40px 24px 80px}.site-footer{padding:24px;grid-template-columns:1fr;gap:8px}.site-footer .center,.site-footer .right{text-align:left}}
  
/* ── Theme toggle ──────────────────────────────────── */
.header-inner { grid-template-columns: 1fr auto auto; }
.theme-toggle {
  background: none; border: none; cursor: pointer; color: inherit;
  padding: 3px; opacity: 0.5; line-height: 0; flex-shrink: 0;
  align-self: center; transition: opacity .2s;
}
.theme-toggle:hover { opacity: 1; }
/* ── Dark mode transition ─────────────────────────── */
body,
.site-header,
.site-footer,
.projects-subnav { transition: background-color .3s ease, color .3s ease, border-color .3s ease; }
.icon-moon { display: none; }
body.dark .icon-sun { display: none; }
body.dark .icon-moon { display: inline; }
/* ── Dark mode base ────────────────────────────────── */
body.dark { background: var(--ink); color: var(--paper); }
body.dark .site-header {
  background: var(--ink);
  border-bottom-color: color-mix(in srgb, var(--paper) 14%, transparent);
}
body.dark .site-footer { border-top-color: color-mix(in srgb, var(--paper) 18%, transparent); }
body.dark .site-header.scrolled .wordmark { color: var(--paper); }
body.dark .site-header.scrolled .wordmark small { color: color-mix(in srgb, var(--paper) 65%, transparent); }
body.dark .site-header.scrolled nav.primary a.active { color: var(--paper); }
body.dark .site-header.scrolled nav.primary a:hover { color: var(--paper); }
body.dark nav.primary a.active { color: var(--paper); }
body.dark nav.primary a:hover  { color: var(--paper); }
body.dark .page-head { border-bottom-color: color-mix(in srgb, var(--paper) 14%, transparent); }
body.dark .page-meta b { color: var(--paper); }
body.dark .article-body p,
body.dark .article-body li { color: color-mix(in srgb, var(--paper) 82%, transparent); }
body.dark .article-body a { color: var(--paper); }
body.dark .article-section { border-top-color: color-mix(in srgb, var(--paper) 12%, transparent); }


/* ── Mobile nav toggle ─────────────────────────────── */
.nav-toggle {
  display: none;
  width: 40px;
  height: 40px;
  border-radius: 999px;
  background: color-mix(in srgb, var(--paper) 78%, transparent);
  border: 1px solid color-mix(in srgb, var(--ink) 14%, transparent);
  cursor: pointer;
  color: inherit;
  padding: 0;
  flex-shrink: 0;
  align-self: center;
  line-height: 0;
  position: relative;
  z-index: 10001;
  transition: transform .15s ease, background-color .2s ease, border-color .2s ease, opacity .2s ease;
  opacity: 0.92;
}
.nav-toggle svg { display: block; }
.nav-toggle:hover {
  background: var(--paper-2);
  border-color: color-mix(in srgb, var(--ink) 20%, transparent);
  opacity: 1;
  transform: translateY(-1px);
}
.nav-toggle:active { transform: translateY(0); }
.nav-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
body.dark .nav-toggle {
  background: color-mix(in srgb, var(--ink) 70%, transparent);
  border-color: color-mix(in srgb, var(--paper) 18%, transparent);
}
body.dark .nav-toggle:hover {
  background: color-mix(in srgb, var(--ink) 84%, transparent);
  border-color: color-mix(in srgb, var(--paper) 26%, transparent);
}
@media (max-width: 720px) {
  .header-inner { grid-template-columns: 1fr auto auto; }
  .nav-toggle { display: inline-flex; align-items: center; justify-content: center; }
  nav.primary.open {
    display: flex !important;
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100dvh;
    padding-top: max(24px, env(safe-area-inset-top));
    padding-bottom: max(24px, env(safe-area-inset-bottom));
    padding-left: 24px;
    padding-right: 24px;
    background: color-mix(in srgb, var(--paper) 92%, transparent);
    backdrop-filter: blur(14px) saturate(140%);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(14px, 3.6vh, 26px);
    z-index: 10000;
    overflow: hidden;
  }
  body.dark nav.primary.open { background: color-mix(in srgb, var(--ink) 92%, transparent); }
  nav.primary.open a {
    font-family: var(--mono);
    font-size: clamp(14px, 2.4vh, 18px);
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink);
    padding: 8px 0;
    display: inline-block;
    position: relative;
    transition: color .2s ease, transform .2s ease;
  }
  nav.primary.open a::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    bottom: -6px;
    height: 1px;
    background: currentColor;
    opacity: 0.35;
    transform: scaleX(0);
    transform-origin: center;
    transition: transform .25s ease, opacity .25s ease;
  }
  body.dark nav.primary.open a { color: var(--paper); }
  nav.primary.open a.active,
  nav.primary.open a:hover { color: var(--accent); }
  nav.primary.open a.active::after { transform: scaleX(1); opacity: 0.55; }
  nav.primary.open a:focus-visible::after { transform: scaleX(1); opacity: 0.65; }
  @media (hover: hover) {
    nav.primary.open a:hover { transform: translateY(-2px); }
    nav.primary.open a:hover::after { transform: scaleX(1); opacity: 0.55; }
  }

  body.nav-open .site-header { background: transparent; border-bottom-color: transparent; }
  body.nav-open .wordmark,
  body.nav-open .theme-toggle { visibility: hidden; pointer-events: none; }
  body.nav-open .nav-toggle {
    position: fixed;
    top: max(16px, env(safe-area-inset-top));
    right: 16px;
  }
  body.nav-open nav.primary.open { background: var(--paper); backdrop-filter: none; }
  body.dark.nav-open nav.primary.open { background: var(--ink); }
}

@media (max-width: 720px) and (max-height: 560px) {
  nav.primary.open { gap: 14px; }
  nav.primary.open a { font-size: 14px; letter-spacing: 0.22em; }
}
</style>
</head>

<script>
(function(){
  var t=document.getElementById('navToggle'),n=document.querySelector('nav.primary');
  if(!t||!n)return;
  var OPEN='<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><line x1="1" y1="1" x2="15" y2="15"/><line x1="15" y1="1" x2="1" y2="15"/></svg>';
  var CLOSED='<svg width="22" height="14" viewBox="0 0 22 14" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><line x1="0" y1="1" x2="22" y2="1"/><line x1="0" y1="7" x2="22" y2="7"/><line x1="0" y1="13" x2="22" y2="13"/></svg>';
  function close(){n.classList.remove('open');t.setAttribute('aria-expanded','false');document.body.classList.remove('nav-open');document.body.style.overflow='';t.innerHTML=CLOSED;}
  t.addEventListener('click',function(){
    var o=n.classList.toggle('open');
    t.setAttribute('aria-expanded',o);
    document.body.classList.toggle('nav-open', o);
    document.body.style.overflow=o?'hidden':'';
    t.innerHTML=o?OPEN:CLOSED;
  });
  n.querySelectorAll('a').forEach(function(a){a.addEventListener('click',close);});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
})();
</script>
  <!-- Scroll to top button -->
  <button id="scrollTopBtn" class="scroll-top" type="button" aria-label="Nach oben" title="Nach oben">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 19V5" />
      <path d="M5 12l7-7 7 7" />
    </svg>
  </button>
  <style>
    .scroll-top{
      position:fixed; right:18px; bottom:18px; z-index:9999;
      width:44px; height:44px; border-radius:999px;
      display:grid; place-items:center;
      border:1px solid color-mix(in srgb, var(--ink, #0e0d0c) 18%, transparent);
      background:color-mix(in srgb, var(--paper, #f4f1ec) 86%, transparent);
      color:var(--ink, #0e0d0c);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      backdrop-filter: blur(12px) saturate(140%);
      box-shadow:0 10px 28px rgba(0,0,0,.14);
      cursor:pointer;
      opacity:0; transform:translateY(8px); pointer-events:none;
      transition: opacity .2s ease, transform .2s ease, background-color .2s ease, border-color .2s ease;
    }
    body.dark .scroll-top{
      border-color: color-mix(in srgb, var(--paper, #f4f1ec) 18%, transparent);
      background: color-mix(in srgb, var(--ink, #0e0d0c) 78%, transparent);
      color: var(--paper, #f4f1ec);
      box-shadow:0 10px 28px rgba(0,0,0,.35);
    }
    .scroll-top.is-visible{ opacity:0.92; transform:translateY(0); pointer-events:auto; }
    .scroll-top:hover{
      opacity:1; transform:translateY(-1px);
      border-color: color-mix(in srgb, var(--accent, #6b1d1a) 55%, transparent);
    }
    .scroll-top:focus-visible{
      outline:2px solid var(--accent, #6b1d1a);
      outline-offset:3px;
      opacity:1;
      pointer-events:auto;
    }
    @media (prefers-reduced-motion: reduce){ .scroll-top{ transition:none; } }
  </style>
  <script>
    (function(){
      var btn = document.getElementById('scrollTopBtn');
      if (!btn) return;
      var showAt = 500;
      function sync(){
        btn.classList.toggle('is-visible', window.scrollY > showAt);
      }
      window.addEventListener('scroll', sync, { passive: true });
      sync();
      btn.addEventListener('click', function(){
        var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        window.scrollTo({ top: 0, behavior: reduce ? 'auto' : 'smooth' });
      });
    })();
  </script>
