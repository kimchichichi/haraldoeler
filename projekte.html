<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HARALD OELER — projekte</title>
  <link rel="icon" href="image/favicon.ico" type="image/x-icon">
  <style>
/* HARALD OELER — projekte */

@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap');

:root {
  --ink: #0e0d0c;
  --paper: #f4f1ec;
  --paper-2: #ebe6dd;
  --rule: #1a1816;
  --muted: #6b655c;
  --accent: #6b1d1a;       /* oxblood — picks up the napkin */
  --accent-soft: #8a2a26;
  --serif: 'Cormorant Garamond', 'Times New Roman', serif;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body.dark {
  background: var(--ink);
  color: var(--paper);
}

a { color: inherit; text-decoration: none; }

/* ---------- Header ---------- */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--paper);
  border-bottom: 1px solid color-mix(in srgb, var(--ink) 12%, transparent);
  backdrop-filter: saturate(140%);
}
body.dark .site-header {
  background: var(--ink);
  border-bottom-color: color-mix(in srgb, var(--paper) 14%, transparent);
}
.header-inner {
  max-width: 1480px;
  margin: 0 auto;
  padding: 22px 48px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: baseline;
  gap: 48px;
}
.wordmark {
  font-family: var(--sans);
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
}
.wordmark .dot {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  margin: 0 10px 2px;
  vertical-align: middle;
}
.wordmark small {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 13px;
  letter-spacing: 0.04em;
  text-transform: none;
  color: var(--muted);
}
nav.primary {
  display: flex;
  gap: 28px;
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: lowercase;
  font-weight: 400;
}
nav.primary a {
  color: var(--muted);
  position: relative;
  padding: 4px 0;
  transition: color .25s ease;
}
nav.primary a.active { color: var(--ink); }
body.dark nav.primary a.active { color: var(--paper); }
nav.primary a:hover { color: var(--ink); }
body.dark nav.primary a:hover { color: var(--paper); }
nav.primary a.active::after {
  content: "";
  position: absolute;
  left: 0; right: 0;
  bottom: -2px;
  height: 1px;
  background: var(--accent);
}

/* ---------- Page header band ---------- */
.page-head {
  max-width: 1480px;
  margin: 0 auto;
  padding: 80px 48px 40px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: end;
  gap: 64px;
  border-bottom: 1px solid color-mix(in srgb, var(--ink) 14%, transparent);
}
.page-head > div:first-child { min-width: 0; }
body.dark .page-head { border-bottom-color: color-mix(in srgb, var(--paper) 18%, transparent); }

.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 18px;
}
.page-title {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(64px, 10vw, 156px);
  line-height: 0.92;
  letter-spacing: -0.02em;
  font-feature-settings: "lnum";
}
.page-title em {
  font-style: italic;
  color: var(--accent);
}
.page-meta {
  text-align: right;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  line-height: 1.7;
}
.page-meta b { color: var(--ink); font-weight: 500; }
body.dark .page-meta b { color: var(--paper); }

/* ---------- Grid ---------- */
.projects {
  max-width: 1480px;
  margin: 0 auto;
  padding: 56px 48px 120px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 56px 40px;
}

.card {
  display: block;
  position: relative;
  cursor: pointer;
  view-transition-name: var(--vt-name);
}
.card .index {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--muted);
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid color-mix(in srgb, var(--ink) 16%, transparent);
}
.card .index .role {
  text-align: right;
  text-transform: uppercase;
  line-height: 1.4;
}
body.dark .card .index { border-bottom-color: color-mix(in srgb, var(--paper) 18%, transparent); }

.card .image-wrap {
  margin-top: 14px;
  aspect-ratio: 4 / 5;
  overflow: hidden;
  background: #1a1816;
  position: relative;
}
.card .image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: grayscale(1) contrast(1.05);
  transition: transform 1.2s cubic-bezier(.2,.7,.1,1), filter .6s ease;
  transform-origin: center;
}
.card:hover .image-wrap img {
  transform: scale(1.04);
  filter: grayscale(1) contrast(1.12) brightness(1.02);
}

.card .image-wrap::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 55%, rgba(14,13,12,0.55) 100%);
  pointer-events: none;
}

.card .meta {
  margin-top: 18px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px 24px;
  align-items: baseline;
}

.card h2 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 38px;
  line-height: 1;
  letter-spacing: -0.005em;
  text-transform: none;
}
.card .role {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
.card p.subtitle {
  grid-column: 1 / -1;
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: 18px;
  line-height: 1.35;
  color: color-mix(in srgb, var(--ink) 72%, transparent);
  max-width: 38ch;
  text-wrap: pretty;
  margin-bottom: 4px;
}
body.dark .card p.subtitle { color: color-mix(in srgb, var(--paper) 75%, transparent); }

.card .arrow {
  margin-top: 14px;
  display: inline-flex;
  align-items: center;
  gap: 12px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  white-space: nowrap;
}
.card .arrow svg {
  transition: transform .35s ease;
}
.card:hover .arrow svg { transform: translateX(6px); }

/* All cards share the same image proportion */
.card.tall .image-wrap,
.card.wide .image-wrap,
.card.default .image-wrap { aspect-ratio: 4 / 5; }

/* ---------- Footer ---------- */
.site-footer {
  border-top: 1px solid color-mix(in srgb, var(--ink) 14%, transparent);
  padding: 32px 48px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 24px;
  max-width: 1480px;
  margin: 0 auto;
}
body.dark .site-footer { border-top-color: color-mix(in srgb, var(--paper) 18%, transparent); }
.site-footer .center { text-align: center; }
.site-footer .right { text-align: right; }

/* ---------- Detail page ---------- */
.detail {
  view-transition-name: detail-root;
}
.detail .hero {
  position: relative;
  height: 78vh;
  min-height: 560px;
  overflow: hidden;
  background: var(--ink);
}
.detail .hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(1) contrast(1.05);
}
.detail .hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(14,13,12,0.25) 0%, transparent 30%, rgba(14,13,12,0.85) 100%);
}
.detail .hero-meta {
  position: absolute;
  left: 48px;
  right: 48px;
  bottom: 48px;
  z-index: 2;
  color: var(--paper);
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 32px;
}
.detail .hero-meta .eyebrow { color: rgba(244,241,236,0.65); }
.detail .hero-meta h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(72px, 12vw, 200px);
  line-height: 0.9;
  letter-spacing: -0.02em;
}
.detail .hero-meta .runtime {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-align: right;
  line-height: 1.8;
  color: rgba(244,241,236,0.8);
}

.detail-body {
  max-width: 1480px;
  margin: 0 auto;
  padding: 96px 48px 80px;
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 80px;
}
.detail-body aside {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  line-height: 1.9;
}
.detail-body aside dt {
  color: var(--muted);
  margin-top: 18px;
  font-size: 10px;
}
.detail-body aside dd {
  color: var(--ink);
  font-family: var(--serif);
  font-style: italic;
  font-size: 17px;
  letter-spacing: 0;
  text-transform: none;
  line-height: 1.5;
  margin-top: 4px;
}
body.dark .detail-body aside dd { color: var(--paper); }

.detail-body .lede {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(28px, 2.6vw, 40px);
  line-height: 1.22;
  letter-spacing: -0.01em;
  text-wrap: pretty;
  max-width: 22ch;
  margin-bottom: 56px;
}


.detail-body .lede em { font-style: italic; color: var(--accent); }

.detail-body .body-copy {
  font-size: 16px;
  line-height: 1.65;
  max-width: 62ch;
  color: color-mix(in srgb, var(--ink) 80%, transparent);
}
body.dark .detail-body .body-copy { color: color-mix(in srgb, var(--paper) 78%, transparent); }
.detail-body .body-copy p + p { margin-top: 1.1em; }

/* Repertoire list */
.repertoire {
  margin-top: 72px;
  border-top: 1px solid color-mix(in srgb, var(--ink) 16%, transparent);
}
body.dark .repertoire { border-top-color: color-mix(in srgb, var(--paper) 18%, transparent); }
.repertoire h3 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 400;
  padding: 24px 0 8px;
}
.repertoire ul { list-style: none; }
.repertoire li {
  display: grid;
  grid-template-columns: 60px 1fr auto;
  gap: 32px;
  padding: 18px 0;
  border-bottom: 1px solid color-mix(in srgb, var(--ink) 10%, transparent);
  align-items: baseline;
  transition: padding-left .35s ease;
}
body.dark .repertoire li { border-bottom-color: color-mix(in srgb, var(--paper) 12%, transparent); }
.repertoire li:hover { padding-left: 14px; }
.repertoire li .num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.1em;
}
.repertoire li .work {
  font-family: var(--serif);
  font-size: 22px;
  letter-spacing: -0.005em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.repertoire li .work em {
  font-style: italic;
  color: var(--muted);
  font-size: 16px;
  margin-left: 10px;
}
.repertoire li .dur {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--muted);
}
.repertoire li.big {
  padding: 22px 0 22px 0;
  border-bottom-width: 2px;
  border-bottom-color: color-mix(in srgb, var(--ink) 18%, transparent);
}
body.dark .repertoire li.big { border-bottom-color: color-mix(in srgb, var(--paper) 22%, transparent); }
.repertoire li.big .num { font-size: 12px; letter-spacing: 0.14em; }
.repertoire li.big .work { font-size: 26px; }
.repertoire li.big .work em { font-size: 19px; }
.repertoire li.indent {
  padding: 13px 0 13px 24px;
  border-bottom-color: color-mix(in srgb, var(--ink) 7%, transparent);
}
body.dark .repertoire li.indent { border-bottom-color: color-mix(in srgb, var(--paper) 9%, transparent); }
.repertoire li.indent .num { font-size: 10px; }
.repertoire li.indent .work { font-size: 19px; }
.repertoire li.sub {
  padding: 10px 0 10px 44px;
  border-bottom-style: dashed;
  border-bottom-color: color-mix(in srgb, var(--ink) 6%, transparent);
}
body.dark .repertoire li.sub { border-bottom-color: color-mix(in srgb, var(--paper) 8%, transparent); }
.repertoire li.sub .num { font-size: 10px; }
.repertoire li.sub .work { font-size: 17px; }
.repertoire li.sub .work em { font-size: 14px; }

/* — Repertoire hover cursor — */
.rep-zone { cursor: none; }
.rep-zone * { cursor: none; }
.rep-cursor {
  position: fixed;
  pointer-events: none;
  z-index: 9000;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity .18s ease;
}
.rep-cursor.visible { opacity: 1; }
.rep-cursor-circle {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  gap: 2px;
}
.rep-cursor-icon {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 300;
  color: var(--paper);
  line-height: 1;
  user-select: none;
}
.rep-cursor-sub {
  font-family: var(--mono);
  font-size: 5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(244,241,236,.7);
  line-height: 1;
  user-select: none;
}

.repertoire-row-link {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: 60px 1fr auto;
  gap: 32px;
  align-items: baseline;
  color: inherit;
  width: 100%;
}
button.repertoire-row-link {
  background: none;
  border: none;
  cursor: pointer;
  font: inherit;
  text-align: left;
  padding: 0;
}
.repertoire li .toggle-icon {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0;
  line-height: 1;
  user-select: none;
}

/* Press quotes */
.quotes {
  margin-top: 96px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 48px;
  padding-top: 48px;
  border-top: 1px solid color-mix(in srgb, var(--ink) 16%, transparent);
}
body.dark .quotes { border-top-color: color-mix(in srgb, var(--paper) 18%, transparent); }
.quote {
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  line-height: 1.4;
  text-wrap: pretty;
}
.quote::before {
  content: "“";
  display: block;
  font-family: var(--serif);
  font-size: 80px;
  line-height: 0.6;
  color: var(--accent);
  margin-bottom: 16px;
}
.quote cite {
  display: block;
  margin-top: 18px;
  font-family: var(--mono);
  font-style: normal;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
}

/* Media (YouTube + Spotify) */
.media {
  margin-top: 96px;
  padding-top: 56px;
  border-top: 1px solid color-mix(in srgb, var(--ink) 16%, transparent);
}
body.dark .media { border-top-color: color-mix(in srgb, var(--paper) 18%, transparent); }
.media h3 {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 28px;
}
.media-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 28px 32px;
}
.media-item { display: flex; flex-direction: column; gap: 14px; }
.media-item .frame {
  position: relative;
  width: 100%;
  background: var(--ink);
  border: 1px solid color-mix(in srgb, var(--ink) 18%, transparent);
  overflow: hidden;
}
body.dark .media-item .frame { border-color: color-mix(in srgb, var(--paper) 14%, transparent); }
.media-item.youtube .frame { aspect-ratio: 16 / 9; }
.media-item.spotify .frame { aspect-ratio: 5 / 2; background: transparent; border: none; }
.media-item .frame iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}
.media-item figcaption {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}

/* Tour dates */
.tour-dates {
  margin-top: 72px;
  border-top: 1px solid color-mix(in srgb, var(--ink) 16%, transparent);
}
body.dark .tour-dates { border-top-color: color-mix(in srgb, var(--paper) 18%, transparent); }
.tour-dates h3 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 400;
  padding: 24px 0 8px;
}
.tour-dates ul { list-style: none; }
.tour-date-item {
  display: grid;
  grid-template-columns: 140px 1fr auto;
  gap: 24px;
  padding: 18px 0;
  border-bottom: 1px solid color-mix(in srgb, var(--ink) 10%, transparent);
  align-items: baseline;
  transition: padding-left .35s ease;
}
body.dark .tour-date-item { border-bottom-color: color-mix(in srgb, var(--paper) 12%, transparent); }
.tour-date-item:hover { padding-left: 14px; cursor: pointer; }
.tour-date-item .t-date {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.12em;
  white-space: nowrap;
}
.tour-date-item .t-venue {
  font-family: var(--serif);
  font-size: 20px;
  letter-spacing: -0.005em;
}
.tour-date-item .t-venue em {
  font-style: italic;
  color: var(--muted);
  font-size: 15px;
  margin-left: 10px;
}
.tour-date-item .t-city {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--muted);
  text-transform: uppercase;
  white-space: nowrap;
}

/* Back link */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 24px 48px;
  max-width: 1480px;
  margin: 0 auto;
  width: 100%;
  transition: color .25s ease;
}
.back-link:hover { color: var(--accent); }
.back-link svg { transition: transform .35s ease; }
.back-link:hover svg { transform: translateX(-6px); }

/* ---------- View Transitions ---------- */
::view-transition-old(root),
::view-transition-new(root) {
  animation-duration: 0.55s;
  animation-timing-function: cubic-bezier(.7,0,.2,1);
}

::view-transition-group(*) {
  animation-duration: 0.7s;
  animation-timing-function: cubic-bezier(.7,0,.2,1);
}

/* ---------- Responsive ---------- */
@media (max-width: 1100px) {
  .projects { grid-template-columns: repeat(2, 1fr); }
  .detail-body { grid-template-columns: 1fr; gap: 40px; }
  .quotes { grid-template-columns: 1fr; }
  .media-grid { grid-template-columns: 1fr; }
}
@media (max-width: 720px) {
  .header-inner { padding: 18px 24px; gap: 16px; }
  nav.primary { display: none; }
  .page-head { padding: 48px 24px 28px; grid-template-columns: 1fr; }
  .page-meta { text-align: left; }
  .projects { grid-template-columns: 1fr; padding: 32px 24px 80px; gap: 48px; }
  .detail .hero-meta { left: 24px; right: 24px; bottom: 24px; grid-template-columns: 1fr; }
  .detail-body { padding: 56px 24px; }
  .back-link { padding: 18px 24px; }
  .site-footer { padding: 24px; grid-template-columns: 1fr; gap: 8px; }
  .site-footer .center, .site-footer .right { text-align: left; }
}

/* ---------- Projects Sub-navigation ---------- */
.projects-subnav {
  background: var(--paper);
  border-bottom: 1px solid color-mix(in srgb, var(--ink) 10%, transparent);
}
body.dark .projects-subnav {
  background: var(--ink);
  border-bottom-color: color-mix(in srgb, var(--paper) 12%, transparent);
}
.projects-subnav-inner {
  max-width: 1480px;
  margin: 0 auto;
  padding: 0 48px;
  display: flex;
  gap: 28px;
  overflow-x: auto;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

function ProjektDetail({ id, onBack }) {
  const proj = PROJECTS.find(p => p.id === id);
  const [expanded, setExpanded] = React.useState(new Set());
  const toggle = (num) => setExpanded(prev => { const n = new Set(prev); n.has(num) ? n.delete(num) : n.add(num); return n; });

  const cursorRef = React.useRef(null);
  const handleRepMove = React.useCallback((e) => {
    const el = cursorRef.current;
    if (!el) return;
    el.style.left = e.clientX + 'px';
    el.style.top = e.clientY + 'px';
    const isLink = !!e.target.closest('a[href]');
    const icon = el.querySelector('.rep-cursor-icon');
    const sub  = el.querySelector('.rep-cursor-sub');
    if (icon) icon.textContent = isLink ? '▶' : '·';
    if (sub)  sub.textContent  = isLink ? 'play' : '';
  }, []);
  const handleRepEnter = React.useCallback(() => {
    cursorRef.current && cursorRef.current.classList.add('visible');
  }, []);
  const handleRepLeave = React.useCallback(() => {
    cursorRef.current && cursorRef.current.classList.remove('visible');
  }, []);
  const parentOf = (num) => num.replace(/\.\d+$/, '.');
  const detail = DETAILS[id] || {
    title: proj.title,
    eyebrow: `Projekt ${proj.num} · ${proj.role}`,
    image: proj.image,
    runtime: ["Programmlänge · 60–90 min", "Besetzung · auf Anfrage", "Verfügbar · 2026 / 2027"],
    lede: [proj.subtitle.split("—")[0] || proj.subtitle],
    body: [
      proj.subtitle + " Ausführliche Programminformationen, Besetzungen und technische Anforderungen werden auf Anfrage bereitgestellt.",
      "Konzerte in Konzertsälen, Kirchen und Festivals — Programmgestaltung individuell mit dem Veranstalter.",
    ],
    repertoire: [
      { num: "I.", work: "Programm", note: "auf Anfrage", dur: "—" },
    ],
    quotes: [
      { text: "Ein Klangkosmos, in dem Stille und Atem ebenso wichtig werden wie die Töne selbst.", cite: "Süddeutsche Zeitung" },
    ],
  };

  return (
    <div className="detail">
      <div ref={cursorRef} className="rep-cursor">
        <div className="rep-cursor-circle">
          <span className="rep-cursor-icon">·</span>
          <span className="rep-cursor-sub"></span>
        </div>
      </div>
      <Header active="projekte" />
      <a className="back-link" href="#" onClick={(e) => { e.preventDefault(); onBack(); }}>
        <Arrow dir="left" /> zurück zu projekte
      </a>
      <section className="hero" style={{ viewTransitionName: `image-${id}` }}>
        <img src={detail.image} alt={detail.title} style={detail.imagePos ? {objectPosition: detail.imagePos} : {}} />
        <div className="hero-meta">
          <div>
            <div className="eyebrow">{detail.eyebrow}</div>
            <h1 style={{ viewTransitionName: `title-${id}` }}>{detail.title}</h1>
          </div>
          <div className="runtime">
            {detail.runtime.map((r, i) => <div key={i}>{r}</div>)}
          </div>
        </div>
      </section>

      <div className="detail-body">
        <aside>
          <dl>
            <dt>Format</dt>
            <dd>{proj.role}</dd>
            <dt>Dauer</dt>
            <dd>60–90 min</dd>
            {detail.tour && detail.tour.length > 0 && (
              <>
                <dt>Nächster Termin</dt>
                <dd>{detail.tour[0].date} · {detail.tour[0].city}</dd>
              </>
            )}
          </dl>
        </aside>

        <div>
          <p className="lede">
            {detail.lede.map((part, i) =>
              typeof part === "string"
                ? <React.Fragment key={i}>{part}</React.Fragment>
                : <em key={i}>{part.em}</em>
            )}
          </p>
          <div className="body-copy">
            {detail.body.map((p, i) => <p key={i}>{p}</p>)}
          </div>
        </div>

        {detail.remembering && (
          <>
            <p className="lede">
              {detail.remembering.lede.map((part, i) =>
                typeof part === "string"
                  ? <React.Fragment key={i}>{part}</React.Fragment>
                  : <em key={i}>{part.em}</em>
              )}
            </p>

            <div className="body-copy">
              {detail.remembering.body.map((p, i) => <p key={i}>{p}</p>)}
            </div>
          </>
        )}

        <div style={{gridColumn: "2"}}>
          <div className="repertoire rep-zone"
               onMouseMove={handleRepMove}
               onMouseEnter={handleRepEnter}
               onMouseLeave={handleRepLeave}>
          <h3>— Auswahl Repertoire</h3>
          <ul>
            {detail.repertoire.map((r, i) => {
              const isSub = /\.\d/.test(r.num);
              if (isSub && !expanded.has(parentOf(r.num))) return null;
              const nextIsSub = detail.repertoire[i + 1] && /\.\d/.test(detail.repertoire[i + 1].num);
              const isExpandable = r.indent && nextIsSub;
              const isOpen = expanded.has(r.num);
              const cls = r.big ? 'big' : r.indent ? 'indent' : isSub ? 'sub' : '';
              if (isExpandable) {
                return (
                  <li key={i} className={cls}>
                    <button className="repertoire-row-link" onClick={() => toggle(r.num)}>
                      <span className="num">{r.num}</span>
                      <span className="work">{r.note}</span>
                      <span className="toggle-icon">{isOpen ? '−' : '+'}</span>
                    </button>
                  </li>
                );
              }
              return (
                <li key={i} className={cls}>
                  <a
                    href={r.id ? `https://www.youtube.com/watch?v=${r.id}` : r.link ? r.link : undefined}
                    target={r.id ? "_blank" : undefined}
                    rel={r.id ? "noopener noreferrer" : undefined}
                    className="repertoire-row-link"
                  >
                    <span className="num">{r.num}</span>
                    <span className="work">
                      {(r.indent || isSub)
                        ? r.note
                        : <>{r.work}{r.note && <em>{r.note}</em>}</>
                      }
                    </span>
                    <span className="dur">{r.dur}</span>
                  </a>
                </li>
              );
            })}
          </ul>
        </div>
          {detail.quotes && detail.quotes.length > 0 && (
            <div className="quotes" style={detail.quotes.length === 1 ? {gridTemplateColumns: '1fr'} : {}}>
              {detail.quotes.map((q, i) => (
                <blockquote key={i} className="quote">
                  {q.text}
                  <cite>— {q.cite}</cite>
                </blockquote>
              ))}
            </div>
          )}

          {detail.media && detail.media.length > 0 && (
            <div className="media">
              <h3>— Hören & sehen</h3>
              <div className="media-grid">
                {detail.media.map((m, i) => (
                  <figure key={i} className={`media-item ${m.kind}`}>
                    <div className="frame">
                      {m.kind === "youtube" ? (
                        <iframe
                          src={`https://www.youtube.com/embed/${m.id}`}
                          title={m.caption}
                          loading="lazy"
                          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                          allowFullScreen
                        />
                      ) : (
                        <iframe
                          src={m.url}
                          title={m.caption}
                          loading="lazy"
                          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                          allowFullScreen
                        />
                      )}
                    </div>
                    <figcaption>{m.caption}</figcaption>
                  </figure>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>

      <Footer />
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "darkMode": false,
  "italicTitle": false,
  "accent": "#6b1d1a"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks({
    ...TWEAK_DEFAULTS,
    darkMode: document.body.classList.contains('dark')
  });

  useEffect(() => {
    document.body.classList.toggle("dark", tweaks.darkMode);
    document.documentElement.style.setProperty("--accent", tweaks.accent);
  }, [tweaks.darkMode, tweaks.accent]);

  return (
    <>
      <ProjekteOverview tweaks={tweaks} />

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakToggle label="Dark mode" value={tweaks.darkMode} onChange={(v) => setTweak("darkMode", v)} />
        <TweakToggle label="Italic title" value={tweaks.italicTitle} onChange={(v) => setTweak("italicTitle", v)} />
        <TweakSection label="Accent color" />
        <TweakColor label="Accent" value={tweaks.accent} onChange={(v) => setTweak("accent", v)} />
        <TweakSelect
          label="Preset"
          value={tweaks.accent}
          onChange={(v) => setTweak("accent", v)}
          options={[
            { label: "Oxblood", value: "#6b1d1a" },
            { label: "Ink", value: "#0e0d0c" },
            { label: "Sage", value: "#3a4a3c" },
            { label: "Mustard", value: "#a07a16" },
          ]}
        />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
