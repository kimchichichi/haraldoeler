/* Harald OELER — projekte / orchester */

@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap');

:root {
  --ink: #0e0d0c;
  --paper: #f4f1ec;
  --paper-2: #ebe6dd;
  --rule: #1a1816;
  --muted: #6b655c;
  --accent: #6b1d1a;
  --accent-soft: #8a2a26;
  --serif: 'Cormorant Garamond', 'Times New Roman', serif;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: inherit; text-decoration: none; }

.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--paper);
  border-bottom: 1px solid color-mix(in srgb, var(--ink) 12%, transparent);
  backdrop-filter: saturate(140%);
}
.header-inner {
  max-width: 1480px;
  margin: 0 auto;
  padding: 22px 48px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: baseline;
  gap: 48px;
}
.wordmark {
  font-family: var(--sans);
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
}
.wordmark .dot {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  margin: 0 10px 2px;
  vertical-align: middle;
}
.wordmark small {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 13px;
  letter-spacing: 0.04em;
  text-transform: none;
  color: var(--muted);
}
nav.primary {
  display: flex;
  gap: 28px;
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: lowercase;
  font-weight: 400;
}
nav.primary a {
  color: var(--muted);
  position: relative;
  padding: 4px 0;
  transition: color .25s ease;
}
nav.primary a.active { color: var(--ink); }
nav.primary a:hover { color: var(--ink); }
nav.primary a.active::after {
  content: "";
  position: absolute;
  left: 0; right: 0;
  bottom: -2px;
  height: 1px;
  background: var(--accent);
}

.projects-subnav {
  background: var(--paper);
  border-bottom: 1px solid color-mix(in srgb, var(--ink) 10%, transparent);
}
.projects-subnav-inner {
  max-width: 1480px;
  margin: 0 auto;
  padding: 0 48px;
  display: flex;
  gap: 28px;
  overflow-x: auto;
  scrollbar-width: none;
}
.projects-subnav-inner::-webkit-scrollbar { display: none; }
.projects-subnav-inner a {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 10px 0;
  white-space: nowrap;
  position: relative;
  transition: color .25s ease;
  flex-shrink: 0;
}
.projects-subnav-inner a:hover { color: var(--ink); }
.projects-subnav-inner a.active { color: var(--ink); }
.projects-subnav-inner a.active::after {
  content: "";
  position: absolute;
  left: 0; right: 0;
  bottom: -1px;
  height: 1px;
  background: var(--accent);
}

.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 18px;
}

.detail .hero {
  position: relative;
  height: 78vh;
  min-height: 560px;
  overflow: hidden;
  background: var(--ink);
}
.detail .hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(1) contrast(1.05);
}
.detail .hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(14,13,12,0.25) 0%, transparent 30%, rgba(14,13,12,0.85) 100%);
}
.detail .hero-meta {
  position: absolute;
  left: 48px; right: 48px; bottom: 48px;
  z-index: 2;
  color: var(--paper);
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 32px;
}
.detail .hero-meta .eyebrow { color: rgba(244,241,236,0.65); }
.detail .hero-meta h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(72px, 12vw, 200px);
  line-height: 0.9;
  letter-spacing: -0.02em;
}
.detail .hero-meta .runtime {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-align: right;
  line-height: 1.8;
  color: rgba(244,241,236,0.8);
}

.detail-body {
  max-width: 1480px;
  margin: 0 auto;
  padding: 96px 48px 80px;
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 80px;
}
.detail-body aside {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  line-height: 1.9;
}
.detail-body aside dt { color: var(--muted); margin-top: 18px; font-size: 10px; }
.detail-body aside dd {
  color: var(--ink);
  font-family: var(--serif);
  font-style: italic;
  font-size: 17px;
  letter-spacing: 0;
  text-transform: none;
  line-height: 1.5;
  margin-top: 4px;
}
.detail-body .lede {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(28px, 2.6vw, 40px);
  line-height: 1.22;
  letter-spacing: -0.01em;
  text-wrap: pretty;
  max-width: 22ch;
  margin-bottom: 56px;
}
.detail-body .lede em { font-style: italic; color: var(--accent); }
.detail-body .body-copy {
  font-size: 16px;
  line-height: 1.65;
  max-width: 62ch;
  color: color-mix(in srgb, var(--ink) 80%, transparent);
}
.detail-body .body-copy p + p { margin-top: 1.1em; }

.repertoire { margin-top: 72px; border-top: 1px solid color-mix(in srgb, var(--ink) 16%, transparent); }
.repertoire h3 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 400;
  padding: 24px 0 8px;
}
.repertoire ul { list-style: none; }
.repertoire li {
  display: grid;
  grid-template-columns: 60px 1fr auto;
  gap: 32px;
  padding: 18px 0;
  border-bottom: 1px solid color-mix(in srgb, var(--ink) 10%, transparent);
  align-items: baseline;
  transition: padding-left .35s ease;
}
.repertoire li:hover { padding-left: 14px; }
.repertoire li .num { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
.repertoire li .work { font-family: var(--serif); font-size: 22px; letter-spacing: -0.005em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.repertoire li .work em { font-style: italic; color: var(--muted); font-size: 16px; margin-left: 10px; }
.repertoire li .dur { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; color: var(--muted); }
.repertoire li.big { padding: 22px 0; border-bottom-width: 2px; border-bottom-color: color-mix(in srgb, var(--ink) 18%, transparent); }
.repertoire li.big .num { font-size: 12px; letter-spacing: 0.14em; }
.repertoire li.big .work { font-size: 26px; }
.repertoire li.indent { padding: 13px 0 13px 24px; border-bottom-color: color-mix(in srgb, var(--ink) 7%, transparent); }
.repertoire li.indent .num { font-size: 10px; }
.repertoire li.indent .work { font-size: 19px; }

.rep-zone { cursor: none; }
.rep-zone * { cursor: none; }
.rep-cursor { position: fixed; pointer-events: none; z-index: 9000; transform: translate(-50%,-50%); opacity: 0; transition: opacity .18s ease; }
.rep-cursor.visible { opacity: 1; }
.rep-cursor-circle { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 2px; }
.rep-cursor-icon { font-family: var(--sans); font-size: 13px; font-weight: 300; color: var(--paper); line-height: 1; user-select: none; }
.rep-cursor-sub { font-family: var(--mono); font-size: 5px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(244,241,236,.7); line-height: 1; user-select: none; }
.repertoire-row-link { grid-column: 1/-1; display: grid; grid-template-columns: 60px 1fr auto; gap: 32px; align-items: baseline; color: inherit; width: 100%; }
button.repertoire-row-link { background: none; border: none; cursor: pointer; font: inherit; text-align: left; padding: 0; }
.repertoire li .toggle-icon { font-family: var(--sans); font-size: 14px; font-weight: 300; color: var(--muted); letter-spacing: 0; line-height: 1; user-select: none; }

.media { margin-top: 96px; padding-top: 56px; border-top: 1px solid color-mix(in srgb, var(--ink) 16%, transparent); }
.media h3 { font-family: var(--mono); font-size: 11px; font-weight: 400; letter-spacing: 0.24em; text-transform: uppercase; color: var(--muted); margin-bottom: 28px; }
.media-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 28px 32px; }
.media-item { display: flex; flex-direction: column; gap: 14px; }
.media-item .frame { position: relative; width: 100%; background: var(--ink); border: 1px solid color-mix(in srgb, var(--ink) 18%, transparent); overflow: hidden; }
.media-item.youtube .frame { aspect-ratio: 16/9; }
.media-item.spotify .frame { aspect-ratio: 5/2; background: transparent; border: none; }
.media-item .frame iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: block; }
.media-item figcaption { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 24px 48px;
  max-width: 1480px;
  margin: 0 auto;
  width: 100%;
  transition: color .25s ease;
}
.back-link:hover { color: var(--accent); }
.back-link svg { transition: transform .35s ease; }
.back-link:hover svg { transform: translateX(-6px); }

.site-footer {
  border-top: 1px solid color-mix(in srgb, var(--ink) 14%, transparent);
  padding: 32px 48px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 24px;
  max-width: 1480px;
  margin: 0 auto;
}
.site-footer .center { text-align: center; }
.site-footer .right { text-align: right; }

@media (max-width: 1100px) {
  .detail-body { grid-template-columns: 1fr; gap: 40px; }
  .media-grid { grid-template-columns: 1fr; }
}
@media (max-width: 720px) {
  .header-inner { padding: 18px 24px; gap: 16px; }
  nav.primary { display: none; }
  .projects-subnav-inner { padding: 0 24px; }
  .detail .hero-meta { left: 24px; right: 24px; bottom: 24px; grid-template-columns: 1fr; }
  .detail-body { padding: 56px 24px; }
  .back-link { padding: 18px 24px; }
  .site-footer { padding: 24px; grid-template-columns: 1fr; gap: 8px; }
  .site-footer .center, .site-footer .right { text-align: left; }
}
  
/* ── Theme toggle ──────────────────────────────────── */
.header-inner { grid-template-columns: 1fr auto auto; }
.theme-toggle {
  background: none; border: none; cursor: pointer; color: inherit;
  padding: 3px; opacity: 0.5; line-height: 0; flex-shrink: 0;
  align-self: center; transition: opacity .2s;
}
.theme-toggle:hover { opacity: 1; }
/* ── Dark mode base ────────────────────────────────── */
body.dark { background: var(--ink); color: var(--paper); }
body.dark .site-header {
  background: var(--ink);
  border-bottom-color: color-mix(in srgb, var(--paper) 14%, transparent);
}
body.dark .site-footer { border-top-color: color-mix(in srgb, var(--paper) 18%, transparent); }
</style>
</head>

      <a className="back-link" href="../projekte.html"><Arrow dir="left" /> zurück zu projekte</a>
      <section className="hero">
        <img src={detail.image} alt={detail.title} style={detail.imagePos ? { objectPosition: detail.imagePos } : {}} />
        <div className="hero-meta">
          <div>
            <div className="eyebrow">{detail.eyebrow}</div>
            <h1>{detail.title}</h1>
          </div>
          <div className="runtime">{detail.runtime.map((r, i) => <div key={i}>{r}</div>)}</div>
        </div>
      </section>
      <div className="detail-body">
        <aside>
          <dl>
            <dt>Format</dt><dd>{proj.role}</dd>
            <dt>Dauer</dt><dd>60–90 min</dd>
            {detail.tour && detail.tour.length > 0 && (<><dt>Nächster Termin</dt><dd>{detail.tour[0].date} · {detail.tour[0].city}</dd></>)}
          </dl>
        </aside>
        <div>
          <p className="lede">
            {detail.lede.map((part, i) => typeof part === "string" ? <React.Fragment key={i}>{part}</React.Fragment> : <em key={i}>{part.em}</em>)}
          </p>
          <div className="body-copy">{detail.body.map((p, i) => <p key={i}>{p}</p>)}</div>
        </div>
        <div style={{ gridColumn: "2" }}>
          <div className="repertoire rep-zone" onMouseMove={handleRepMove} onMouseEnter={handleRepEnter} onMouseLeave={handleRepLeave}>
            <h3>— Auswahl Repertoire</h3>
            <ul>
              {detail.repertoire.map((r, i) => {
                const isSub = /\.\d/.test(r.num);
                if (isSub && !expanded.has(parentOf(r.num))) return null;
                const nextIsSub = detail.repertoire[i + 1] && /\.\d/.test(detail.repertoire[i + 1].num);
                const isExpandable = r.indent && nextIsSub;
                const isOpen = expanded.has(r.num);
                const cls = r.big ? 'big' : r.indent ? 'indent' : isSub ? 'sub' : '';
                if (isExpandable) {
                  return (<li key={i} className={cls}><button className="repertoire-row-link" onClick={() => toggle(r.num)}><span className="num">{r.num}</span><span className="work">{r.note}</span><span className="toggle-icon">{isOpen ? '−' : '+'}</span></button></li>);
                }
                return (
                  <li key={i} className={cls}>
                    <a href={r.id ? `https://www.youtube.com/watch?v=${r.id}` : undefined} target={r.id ? "_blank" : undefined} rel={r.id ? "noopener noreferrer" : undefined} className="repertoire-row-link">
                      <span className="num">{r.num}</span>
                      <span className="work">{(r.indent || isSub) ? r.note : <>{r.work}{r.note && <em>{r.note}</em>}</>}</span>
                      <span className="dur">{r.dur}</span>
                    </a>
                  </li>
                );
              })}
            </ul>
          </div>
          {detail.media && detail.media.length > 0 && (
            <div className="media">
              <h3>— Hören &amp; sehen</h3>
              <div className="media-grid">
                {detail.media.map((m, i) => (
                  <figure key={i} className={`media-item ${m.kind}`}>
                    <div className="frame">
                      {m.kind === "youtube"
                        ? <iframe src={`https://www.youtube.com/embed/${m.id}`} title={m.caption} loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowFullScreen />
                        : <iframe src={m.url} title={m.caption} loading="lazy" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" allowFullScreen />}
                    </div>
                    <figcaption>{m.caption}</figcaption>
                  </figure>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ProjektDetail id={PROJECT_ID} />);

  </script>
</body>
</html>
